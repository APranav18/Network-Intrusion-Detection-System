{% extends "base.html" %}

{% block title %}Dashboard - AI-NIDS{% endblock %}

{% block content %}
<div class="dashboard compact-dashboard" style="min-height:70vh;display:flex;align-items:center;justify-content:center;">
  <div class="search-shell" style="width:100%;max-width:760px;padding:2rem;text-align:center;">
    <h1 class="search-title">IP Lookup</h1>
    <p class="search-sub">Enter an IP address to analyze</p>

    <div class="search-row">
      <input id="ipInput" type="search" placeholder="e.g. 8.8.8.8 or 185.220.101.42" autofocus />
      <button id="ipSearchBtn" class="btn btn-red">Lookup</button>
    </div>
  </div>
</div>

<style>
.compact-dashboard { padding: 1rem; }
:root {
  --muted-color: #c7c7c9;
  --accent-red: #ff3b30;
}
.btn { background: transparent; border: 1px solid rgba(255,255,255,0.06); padding: 0.4rem 0.7rem; border-radius:4px; color:inherit; }
.btn-red { background: linear-gradient(90deg,var(--accent-red), #ff6b6b); color: #fff; border: none; padding: 0.9rem 1.2rem; border-radius:8px; font-weight:700; font-size:1rem; box-shadow: 0 6px 18px rgba(255,59,48,0.14); }
.btn-red:hover { transform: translateY(-1px); box-shadow: 0 10px 26px rgba(255,59,48,0.18); }
.compact-dashboard {
  background: radial-gradient(1200px 400px at 10% 20%, rgba(255,80,80,0.06), transparent),
              radial-gradient(800px 300px at 90% 80%, rgba(255,20,20,0.04), transparent),
              linear-gradient(180deg, rgba(10,4,6,0.85), rgba(6,2,3,0.9));
}
.search-shell {
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  border-radius: 14px;
  padding: 2rem;
  box-shadow: 0 8px 30px rgba(5,5,10,0.6);
  backdrop-filter: blur(8px) saturate(120%);
  -webkit-backdrop-filter: blur(8px) saturate(120%);
  border: 1px solid rgba(255,255,255,0.04);
}
.search-title { margin:0 0 0.5rem;font-size:1.8rem;color: #fff; }
.search-sub { margin:0 0 1.2rem;color:var(--muted-color); }
.search-row { display:flex;gap:0.5rem;align-items:center;justify-content:center; }
.search-row input[type="search"] {
  flex:1;padding:1rem 1.2rem;border-radius:8px;border:1px solid rgba(255,59,48,0.12);background: rgba(255,255,255,0.02);color:#fff;font-size:1.15rem;box-shadow: 0 6px 18px rgba(0,0,0,0.6) inset;
  transition: box-shadow 180ms ease, transform 120ms ease, border-color 180ms ease;
}
.search-row input[type="search"]::placeholder { color: rgba(255,255,255,0.6); }
.search-row input[type="search"]:focus {
  outline: none; border-color: rgba(255,59,48,0.28); box-shadow: 0 10px 30px rgba(255,59,48,0.12), 0 2px 6px rgba(0,0,0,0.6) inset; transform: translateY(-1px);
}
@media (max-width: 576px) {
  .search-shell { padding: 1.2rem; }
  .search-row { flex-direction: column; }
  .search-row input[type="search"] { width: 100%; }
  .btn-red { width: 100%; }
}
</style>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function(){
  const input = document.getElementById('ipInput');
  const btn = document.getElementById('ipSearchBtn');
  function doSearch(){
    const val = input.value && input.value.trim();
    if(!val) return;
    window.location.href = `/ip-detection/?ip=${encodeURIComponent(val)}`;
  }
  btn.addEventListener('click', doSearch);
  input.addEventListener('keydown', function(e){ if(e.key === 'Enter') doSearch(); });
});
</script>
{% endblock %}
